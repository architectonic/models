name: model-catalog

on:
  workflow_dispatch: {}
  schedule:
    - cron: "17 9 * * 1"

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build live OpenRouter model snapshot
        run: |
          python scripts/openrouter_model_catalog.py snapshot --sort top-weekly
          python scripts/openrouter_model_catalog.py validate
      - name: Commit generated catalog when changed
        run: |
          git config user.name "architectonic-models-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/openrouter/raw data/openrouter/generated || true
          if git diff --cached --quiet; then
            echo "No model catalog changes."
            exit 0
          fi
          git commit -m "Refresh OpenRouter model catalog"
          git push
